version: "3.8"

services:
  attacker:
    image: kalilinux/kali-rolling
    container_name: attacker
    tty: true
    cap_add:
      - NET_ADMIN
    networks:
      net-attack:
        ipv4_address: 10.9.0.5
    command: bash -c "
      apt update && apt install -y iproute2 iputils-ping curl &&
      ip route add 192.168.60.0/24 via 10.9.0.11 &&
      tail -f /dev/null
     "

  server:
    image: nginx:alpine
    container_name: server
    cap_add:
      - NET_ADMIN
    networks:
      net-server:
        ipv4_address: 192.168.60.5
    command: sh -c "
      ip route add default via 192.168.60.11 || true;
      nginx -g 'daemon off;'
     "

  router:
    image: jasonish/suricata:latest
    container_name: router
    tty: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      net-attack:
        ipv4_address: 10.9.0.11
      net-server:
        ipv4_address: 192.168.60.11
    volumes:
      - ./suricata:/etc/suricata
    command: sh -c "
      ip addr && \

      suricata -T -c /etc/suricata/suricata.yaml || echo 'CONFIG FAILED' && \

      suricata -c /etc/suricata/suricata.yaml -i eth0 -i eth1 & \

      sleep infinity
     "

networks:
  net-attack:
    driver: bridge
    ipam:
      config:
        - subnet: 10.9.0.0/24

  net-server:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.60.0/24